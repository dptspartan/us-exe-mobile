name: Deploy preview APK (EAS)

# main = source only. Preview APK builds when you tag a commit on main (e.g. v1.0.0).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Tag must point to a commit on main. Merge your PR to main first, then create the tag on main."
            exit 1
          fi

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "source=tag" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./app.json').expo.version")
            echo "source=main" >> "$GITHUB_OUTPUT"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Sync app.json version
        run: |
          jq --arg v "${{ steps.version.outputs.value }}" '.expo.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for EAS build
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          printf 'EXPO_PUBLIC_SUPABASE_URL=%s\nEXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "$EXPO_PUBLIC_SUPABASE_URL" "$EXPO_PUBLIC_SUPABASE_ANON_KEY" > .env

      - name: Build preview APK on EAS
        id: eas
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          MESSAGE="Release ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref_name }} (${{ steps.version.outputs.value }})"
          npx eas-cli build \
            --profile preview \
            --platform android \
            --non-interactive \
            --wait \
            --json \
            --message "$MESSAGE" \
            > build-output.json

          STATUS=$(jq -r '.[0].status // empty' build-output.json)
          if [[ "$STATUS" != "FINISHED" ]]; then
            echo "::error::EAS build did not finish successfully (status: ${STATUS:-unknown})"
            jq '.' build-output.json || true
            exit 1
          fi

          BUILD_ID=$(jq -r '.[0].id' build-output.json)
          INSTALL_URL=$(jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty' build-output.json)
          BUILD_PAGE="https://expo.dev/accounts/dptspartan/projects/us-exe-mobile/builds/${BUILD_ID}"

          if [[ -z "$INSTALL_URL" ]]; then
            echo "::warning::No direct install URL in build artifacts; using Expo build page."
            INSTALL_URL="$BUILD_PAGE"
          fi

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "install_url=$INSTALL_URL" >> "$GITHUB_OUTPUT"
          echo "build_page=$BUILD_PAGE" >> "$GITHUB_OUTPUT"

      - name: Print install QR to logs
        env:
          INSTALL_URL: ${{ steps.eas.outputs.install_url }}
        run: npx --yes qrcode-terminal@0.12.0 "$INSTALL_URL"

      - name: Write job summary with QR
        env:
          INSTALL_URL: ${{ steps.eas.outputs.install_url }}
          BUILD_PAGE: ${{ steps.eas.outputs.build_page }}
          VERSION: ${{ steps.version.outputs.value }}
          REF_NAME: ${{ github.event_name == 'workflow_dispatch' && 'main (manual)' || github.ref_name }}
        run: |
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''${INSTALL_URL}''', safe=''))")
          {
            echo "## Us.exe mobile preview APK"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Release** | \`${REF_NAME}\` → v${VERSION} |"
            echo "| **Profile** | \`preview\` (internal APK) |"
            echo "| **Install** | [Open install link](${INSTALL_URL}) |"
            echo "| **Build** | [expo.dev build page](${BUILD_PAGE}) |"
            echo ""
            echo "### Scan to install (Android)"
            echo ""
            echo "![Install QR code](https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${ENCODED})"
            echo ""
            echo "Uninstall any older APK first. See \`SAMSUNG_INSTALL.md\` if install fails on Samsung."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-${{ steps.eas.outputs.build_id }}
          retention-days: 30
          path: build-output.json
